<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Drop Demo</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 800px;
            margin: 0 auto;
            padding: 2rem;
            line-height: 1.6;
        }

        .example {
            margin: 2rem 0;
            padding: 1.5rem;
            border: 1px solid #e1e5e9;
            border-radius: 8px;
            background: #f8f9fa;
        }

        .example h3 {
            margin-top: 0;
        }

        file-drop {
            display: block;
            margin: 1rem 0;
        }

        .custom-drop {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 3rem;
            text-align: center;
            font-size: 1.1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .custom-drop:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .custom-drop.-dragover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            transform: scale(1.02);
        }

        input[type="file"] {
            margin: 1rem 0;
            padding: 0.5rem;
        }

        .file-info {
            margin: 1rem 0;
            padding: 1rem;
            background: white;
            border-radius: 4px;
            border-left: 4px solid #007bff;
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <h1>File Drop Component Demo</h1>
    <p>A vanilla JS custom element for drag-and-drop file handling.</p>

    <div class="example">
        <h3>Basic Usage</h3>
        <file-drop for="basic-input">
            Drop files here
        </file-drop>
        <input type="file" id="basic-input" multiple>
        <div id="basic-info" class="file-info hidden">
            <strong>Selected files:</strong>
            <ul id="basic-list"></ul>
        </div>
    </div>

    <div class="example">
        <h3>Single File Upload</h3>
        <file-drop for="single-input">
            Drop a single file here
        </file-drop>
        <input type="file" id="single-input">
        <div id="single-info" class="file-info hidden">
            <strong>Selected file:</strong>
            <span id="single-name"></span>
        </div>
    </div>

    <div class="example">
        <h3>Custom Styled</h3>
        <file-drop for="custom-input" class="custom-drop" data-no-default-styles>
            🎨 Custom styled drop zone<br>
            <small>Drag files here</small>
        </file-drop>
        <input type="file" id="custom-input" multiple accept="image/*">
        <div id="custom-info" class="file-info hidden">
            <strong>Selected images:</strong>
            <ul id="custom-list"></ul>
        </div>
    </div>

    <script type="module">
        import './src/file-drop.js'

        // Basic example
        document.getElementById('basic-input').addEventListener('change', function(e) {
            const info = document.getElementById('basic-info')
            const list = document.getElementById('basic-list')

            if (this.files.length > 0) {
                list.innerHTML = ''
                for (let file of this.files) {
                    const li = document.createElement('li')
                    li.textContent = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`
                    list.appendChild(li)
                }
                info.classList.remove('hidden')
            } else {
                info.classList.add('hidden')
            }
        })

        // Single file example
        document.getElementById('single-input').addEventListener('change', function(e) {
            const info = document.getElementById('single-info')
            const nameSpan = document.getElementById('single-name')

            if (this.files.length > 0) {
                nameSpan.textContent = `${this.files[0].name} (${(this.files[0].size / 1024).toFixed(1)} KB)`
                info.classList.remove('hidden')
            } else {
                info.classList.add('hidden')
            }
        })

        // Custom example
        document.getElementById('custom-input').addEventListener('change', function(e) {
            const info = document.getElementById('custom-info')
            const list = document.getElementById('custom-list')

            if (this.files.length > 0) {
                list.innerHTML = ''
                for (let file of this.files) {
                    const li = document.createElement('li')
                    li.textContent = `${file.name} (${(file.size / 1024).toFixed(1)} KB)`
                    list.appendChild(li)
                }
                info.classList.remove('hidden')
            } else {
                info.classList.add('hidden')
            }
        })
    </script>
</body>
</html>
